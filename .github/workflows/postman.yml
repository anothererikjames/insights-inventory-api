name: Postman Collection Run
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  postman:
    runs-on: ubuntu-latest
    name: Run Inventory Tests
    steps:
      - uses: actions/checkout@v4

      - name: Install and Run Postman Tests
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          curl -o- "https://dl-cli.pstmn.io/install.sh" | sh
          export PATH="$HOME/.local/share/postman-cli:$PATH"
          postman login --with-api-key "$POSTMAN_API_KEY"
          postman collection run "52238111-2607d3bd-795d-40ba-8205-0d61916f6820" \
            --environment "52238111-83fedf35-a239-4585-9d6b-ff59eacb7aba" \
            --verbose